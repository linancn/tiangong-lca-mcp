{
  "version": 1,
  "lastReviewedAt": "2026-04-18",
  "lastReviewedCommit": "ec9c15dfcbb398b56b5da7e918a3a6c7ae8d1414",
  "rules": [
    {
      "id": "mcp-bootstrap-contract",
      "scope": "repo",
      "repo": "mcp",
      "triggers": [
        {
          "path": "AGENTS.md",
          "kind": "doc-contract"
        },
        {
          "path": "README.md",
          "kind": "doc-entry"
        },
        {
          "path": "README_CN.md",
          "kind": "doc-entry"
        },
        {
          "path": "DEV_EN.md",
          "kind": "doc-maintainer"
        },
        {
          "path": "DEV_CN.md",
          "kind": "doc-maintainer"
        },
        {
          "path": "ai/**",
          "kind": "doc-ai-layer"
        }
      ],
      "requiredDocs": [
        {
          "path": "AGENTS.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/repo.yaml",
          "mode": "review_or_update"
        },
        {
          "path": "ai/task-router.md",
          "mode": "review_or_update"
        }
      ],
      "reason": "Entry guidance, repo facts, and routing docs must stay aligned."
    },
    {
      "id": "mcp-transport-and-auth-contract",
      "scope": "repo",
      "repo": "mcp",
      "triggers": [
        {
          "path": "package.json",
          "kind": "runtime-config"
        },
        {
          "path": ".nvmrc",
          "kind": "runtime-config"
        },
        {
          "path": "Dockerfile",
          "kind": "runtime-config"
        },
        {
          "path": ".env.example",
          "kind": "runtime-config"
        },
        {
          "path": "mcp_config.json",
          "kind": "client-config"
        },
        {
          "path": "src/index.ts",
          "kind": "transport"
        },
        {
          "path": "src/index_server.ts",
          "kind": "transport"
        },
        {
          "path": "src/index_server_local.ts",
          "kind": "transport"
        },
        {
          "path": "src/auth_app.ts",
          "kind": "oauth"
        },
        {
          "path": "src/_shared/**",
          "kind": "shared-runtime"
        },
        {
          "path": "public/**",
          "kind": "static-surface"
        }
      ],
      "requiredDocs": [
        {
          "path": "AGENTS.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/repo.yaml",
          "mode": "review_or_update"
        },
        {
          "path": "ai/task-router.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/validation.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/architecture.md",
          "mode": "review_or_update"
        }
      ],
      "reason": "Transport, auth, and runtime prerequisite changes alter the executable MCP contract and should refresh the AI bootstrap docs."
    },
    {
      "id": "mcp-tool-contract",
      "scope": "repo",
      "repo": "mcp",
      "triggers": [
        {
          "path": "src/tools/**",
          "kind": "tool-wrapper"
        },
        {
          "path": "src/prompts/**",
          "kind": "prompt"
        },
        {
          "path": "src/resources/**",
          "kind": "resource"
        },
        {
          "path": "test/**",
          "kind": "demo-test"
        }
      ],
      "requiredDocs": [
        {
          "path": "AGENTS.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/repo.yaml",
          "mode": "review_or_update"
        },
        {
          "path": "ai/task-router.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/validation.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/architecture.md",
          "mode": "review_or_update"
        }
      ],
      "reason": "Tool wrapper and content changes alter what the MCP server exposes and how future work should be routed and checked."
    },
    {
      "id": "mcp-ai-doc-maintenance-contract",
      "scope": "repo",
      "repo": "mcp",
      "triggers": [
        {
          "path": ".github/workflows/ai-doc-lint.yml",
          "kind": "automation"
        },
        {
          "path": ".github/scripts/ai-doc-lint.mjs",
          "kind": "automation"
        },
        {
          "path": ".github/scripts/ai-doc-lint.test.mjs",
          "kind": "automation"
        }
      ],
      "requiredDocs": [
        {
          "path": "AGENTS.md",
          "mode": "review_or_update"
        },
        {
          "path": "ai/repo.yaml",
          "mode": "review_or_update"
        },
        {
          "path": "ai/doc-impact.yaml",
          "mode": "review_or_update"
        },
        {
          "path": "ai/validation.md",
          "mode": "review_or_update"
        }
      ],
      "reason": "Repo-local AI doc maintenance automation changes alter the maintenance gate and should refresh the AI contract docs."
    }
  ]
}
